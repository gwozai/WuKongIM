<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1500" height="800" viewBox="0 0 1500 800" style="background-color:#f8f9fa"><defs><marker id="arrowhead" markerHeight="4" markerWidth="6" orient="auto" refX="0" refY="2"><polygon fill="#adb5bd" points="0 0 6 2 0 4"/></marker><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="2" dy="2" result="offsetblur"/><feComponentTransfer><feFuncA slope=".3" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="user-gradient" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#74c0fc;stop-opacity:1"/><stop offset="100%" style="stop-color:#4dabf7;stop-opacity:1"/></linearGradient><linearGradient id="proxy-gradient" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#4c6ef5;stop-opacity:1"/><stop offset="100%" style="stop-color:#364fc7;stop-opacity:1"/></linearGradient><linearGradient id="admin-gradient" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#66d9e8;stop-opacity:1"/><stop offset="100%" style="stop-color:#22b8cf;stop-opacity:1"/></linearGradient><linearGradient id="node-gradient" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#ffa94d;stop-opacity:1"/><stop offset="100%" style="stop-color:#f76707;stop-opacity:1"/></linearGradient><style>.box{filter:url(#shadow);stroke:#fff;stroke-width:2}.user-box{fill:url(#user-gradient);rx:4;ry:4}.proxy-box{fill:url(#proxy-gradient);rx:4;ry:4}.admin-box{fill:url(#admin-gradient);rx:4;ry:4}.node-circle{fill:url(#node-gradient);filter:url(#shadow);stroke:#fff;stroke-width:2}.pool-circle{fill:#fff;stroke:#dee2e6;stroke-width:2;stroke-dasharray:8 4}.text-white{fill:#fff;text-anchor:middle;font-size:14px;font-weight:600}.text-desc,.text-title,.text-white{font-family:&apos;Segoe UI&apos;,sans-serif}.text-title{fill:#343a40;text-anchor:middle;font-size:16px;font-weight:700}.text-desc{fill:#868e96;font-size:12px}.arrow,.arrow-dashed{stroke:#adb5bd;stroke-width:1.5;marker-end:url(#arrowhead);fill:none}.arrow-dashed{stroke-dasharray:4 2}</style></defs><rect width="120" height="100" x="50" y="300" class="box user-box"/><text x="110" y="355" class="text-white">中国用户</text><rect width="120" height="100" x="50" y="500" class="box user-box"/><text x="110" y="555" class="text-white">海外用户</text><rect width="120" height="100" x="300" y="300" class="box proxy-box"/><text x="360" y="345" class="text-white">国内 N 个</text><text x="360" y="365" class="text-white">代理节点</text><rect width="120" height="100" x="300" y="500" class="box proxy-box"/><text x="360" y="545" class="text-white">海外 N 个</text><text x="360" y="565" class="text-white">代理节点</text><line x1="180" x2="290" y1="330" y2="330" class="arrow"/><line x1="290" x2="180" y1="370" y2="370" class="arrow"/><line x1="180" x2="290" y1="530" y2="530" class="arrow"/><line x1="290" x2="180" y1="570" y2="570" class="arrow"/><circle cx="800" cy="450" r="280" class="pool-circle"/><text x="800" y="140" class="text-title">WuKongIM 去中心化分布式池</text><g transform="translate(620, 270)"><circle cx="50" cy="50" r="45" class="node-circle"/><text x="50" y="55" class="text-white" font-size="12">WuKongIM</text><circle cx="180" cy="50" r="45" class="node-circle"/><text x="180" y="55" class="text-white" font-size="12">WuKongIM</text><circle cx="310" cy="50" r="45" class="node-circle"/><text x="310" y="55" class="text-white" font-size="12">WuKongIM</text><circle cx="50" cy="180" r="45" class="node-circle"/><text x="50" y="185" class="text-white" font-size="12">WuKongIM</text><circle cx="180" cy="180" r="45" class="node-circle"/><text x="180" y="185" class="text-white" font-size="12">WuKongIM</text><circle cx="310" cy="180" r="45" class="node-circle"/><text x="310" y="185" class="text-white" font-size="12">WuKongIM</text><circle cx="50" cy="310" r="45" class="node-circle"/><text x="50" y="315" class="text-white" font-size="12">WuKongIM</text><circle cx="180" cy="310" r="45" class="node-circle"/><text x="180" y="315" class="text-white" font-size="12">WuKongIM</text><circle cx="310" cy="310" r="45" class="node-circle"/><text x="310" y="315" class="text-white" font-size="12">...</text></g><line x1="430" x2="560" y1="350" y2="350" class="arrow"/><line x1="430" x2="560" y1="550" y2="550" class="arrow"/><circle cx="500" cy="50" r="15" fill="#a5d8ff"/><circle cx="500" cy="80" r="25" fill="#a5d8ff"/><rect width="120" height="80" x="600" y="40" class="box admin-box"/><text x="660" y="85" class="text-white">管理系统</text><line x1="530" x2="590" y1="80" y2="80" class="arrow"/><rect width="120" height="80" x="600" y="150" class="box proxy-box"/><text x="660" y="195" class="text-white">代理节点</text><line x1="660" x2="660" y1="125" y2="145" class="arrow"/><line x1="660" x2="660" y1="235" y2="265" class="arrow"/><circle cx="1150" cy="250" r="45" class="node-circle"/><text x="1150" y="255" class="text-white" font-size="12">WuKongIM</text><line x1="1110" x2="980" y1="280" y2="330" class="arrow-dashed"/><g><text x="180" y="250" class="text-desc" text-anchor="middle">只有代理节点向外服务，真实 WuKongIM 节点隐藏在背后，</text><text x="180" y="270" class="text-desc" text-anchor="middle">避免恶意攻击直接打到真实节点</text></g><g><text x="0" y="0" class="text-desc" text-anchor="start" transform="translate(1160, 350)">WuKongIM 节点都是去中心化的</text><text x="0" y="20" class="text-desc" text-anchor="start" transform="translate(1160, 350)">当用户数量上升的时候，往这池子里一键加 WuKongIM 节点即可</text></g><g><text x="0" y="0" class="text-desc" text-anchor="start" transform="translate(1120, 500)">当池中某个节点出现故障，故障将会自动愈合</text></g></svg>